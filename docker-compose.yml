services:
  timescaledb:
    image: timescale/timescaledb:latest-pg18
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      TZ: Asia/Taipei
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - orion-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - /opt/mosquitto/config:/mosquitto/config:ro
      - /opt/mosquitto/certs:/mosquitto/certs:ro
      - /opt/mosquitto/data:/mosquitto/data
      - /opt/mosquitto/log:/mosquitto/log
    networks:
      - orion-net

  orion:
    build: .
    image: orion:latest
    container_name: orion
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      PORT: "8000"

      # Database — names match .env.example exactly
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: orion
      DB_USER: orion
      DB_PASSWORD: ${DB_PASSWORD:-change_me}

      # MQTT — names match .env.example and service/mqtt.go exactly
      # Previously this was MQTT_HOST, which caused InitMQTT() to read an empty string.
      MQTT_BROKER: mosquitto
      MQTT_PORT: "8883"
      MQTT_USERNAME: orion
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change_me}
      MQTT_CA_CERT: /etc/ssl/certs/orion-mqtt-ca.crt

      MQTT_TLS_SERVER_NAME: mqtt.eversource-ai.com

      # Nginx and Orion are on the same machine, so the proxy source is always loopback.
      # Setting this to an empty string will cause Gin to ignore X-Forwarded-For 
      # and treat all requests as coming from the proxy, 
      # which is fine for local development but not for production.
      TRUSTED_PROXIES: "127.0.0.1"
    volumes:
      - /opt/mosquitto/certs/ca.crt:/etc/ssl/certs/orion-mqtt-ca.crt:ro
    ports:
      - "8000:8000"
    networks:
      - orion-net

volumes:
  timescaledb_data:
    external: true
    name: orion_timescaledb_data

networks:
  orion-net:
    driver: bridge